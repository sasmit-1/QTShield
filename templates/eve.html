<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantumShield - EVE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0ff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  header { background: linear-gradient(135deg, #0d0d1a 0%, #1a0a2e 100%); padding: 20px 40px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #ff4466, #ff9900); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .tagline { font-size: 13px; color: #8888aa; margin-top: 4px; }
  .panel { padding: 40px; max-width: 800px; margin: 0 auto; }
  .card { background: #111122; border: 1px solid #2a2a4a; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
  .card-title { font-size: 13px; font-weight: 600; color: #8888aa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .btn { padding: 12px 28px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; width: 100%; }
  .btn-primary { background: linear-gradient(135deg, #ff4466, #ff0044); color: white; }
  .btn-primary:active { transform: translateY(2px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 12px; display: none; }
  .status.success { background: #0a2a0a; border: 1px solid #00ff88; color: #00ff88; display: block; }
  .status.danger  { background: #2a0a0a; border: 1px solid #ff4466; color: #ff4466; display: block; }
  .status.info    { background: #0a1a2a; border: 1px solid #00d4ff; color: #00d4ff; display: block; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">Eve Node</div>
    <div class="tagline">Eavesdropper Terminal</div>
  </div>
  <div style="text-align: right">
    <span style="color:#ff4466; font-weight: bold;">● Lurking</span><br>
    <a href="/" style="color:#8888aa; font-size: 12px; text-decoration: none;">Back Home</a>
  </div>
</header>
<div class="panel">
  <div class="card" id="idle-card">
    <div class="card-title">Status</div>
    <div class="status info" id="wait-msg">Idle: Waiting for quantum data to enter channel...</div>
  </div>
  
  <div class="card" id="action-card" style="display: none; border-color: #ff4466;">
    <div class="card-title" style="color: #ff4466;">🚨 QUBITS IN TRANSIT</div>
    <p style="color: #e0e0ff; margin-bottom: 20px; font-size: 14px;">Alice has sent quantum data to Bob. Do you want to intercept it?</p>
    <div class="grid-2">
      <button class="btn btn-primary" id="btn-intercept" onclick="makeDecision(true)">Intercept & Measure</button>
      <button class="btn btn-primary" id="btn-pass" style="background: #2a2a4a;" onclick="makeDecision(false)">Let Pass</button>
    </div>
  </div>

  <div class="card" id="results-card" style="display: none;">
    <div class="card-title">Results</div>
    <div id="status" class="status"></div>
  </div>
</div>
<script>
  const socket = io();
  
  socket.on('data_in_transit', (data) => {
    document.getElementById('idle-card').style.display = 'none';
    document.getElementById('action-card').style.display = 'block';
    document.getElementById('results-card').style.display = 'none';
    document.getElementById('btn-intercept').disabled = false;
    document.getElementById('btn-pass').disabled = false;
  });

  function makeDecision(intercept) {
    document.getElementById('btn-intercept').disabled = true;
    document.getElementById('btn-pass').disabled = true;
    document.getElementById('action-card').style.display = 'none';
    socket.emit('eve_decision', { intercept: intercept });
    
    document.getElementById('results-card').style.display = 'block';
    let st = document.getElementById('status');
    st.className = 'status ' + (intercept ? 'danger' : 'info');
    st.textContent = intercept ? 'You intercepted and destroyed the original qubits. Sending fakes to Bob...' : 'You let the transmission pass untouched.';
  }

  socket.on('demo_reset', () => {
    document.getElementById('idle-card').style.display = 'block';
    document.getElementById('action-card').style.display = 'none';
    document.getElementById('results-card').style.display = 'none';
  });

</script>
</body>
</html>
